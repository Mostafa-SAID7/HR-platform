<!-- Auth Layout Container -->
<div 
  class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 flex items-center justify-center p-4"
  [dir]="i18nService.isArabic() ? 'rtl' : 'ltr'"
>
  <!-- Animated Background Elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-indigo-600/20 rounded-full mix-blend-multiply filter blur-3xl animate-blob"></div>
    <div class="absolute top-0 right-1/4 w-96 h-96 bg-purple-600/20 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-0 left-1/2 w-96 h-96 bg-pink-600/20 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-4000"></div>
  </div>

  <!-- Main Content Container -->
  <div class="relative z-10 w-full max-w-md">
    <!-- Logo & Brand Section -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-indigo-600 to-indigo-700 rounded-2xl shadow-2xl shadow-indigo-600/50 mb-4">
        <span class="text-2xl font-black text-white">HR</span>
      </div>
      <h1 class="text-3xl font-black text-white mb-2">HR Analytics</h1>
      <p class="text-indigo-200/80 text-sm font-medium">Intelligence Platform</p>
    </div>

    <!-- Auth Card -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 shadow-2xl">
      <!-- Router Outlet for Login/Signup Forms -->
      <router-outlet [@fadeIn]></router-outlet>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center">
      <div class="flex items-center justify-center gap-4 mb-6">
        <!-- Theme Toggle -->
        <button
          (click)="toggleTheme()"
          class="p-2 rounded-lg hover:bg-white/10 text-white/60 hover:text-white transition-all"
          title="Toggle theme"
        >
          <svg *ngIf="themeService.isDarkMode()" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.536l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.121-10.607a1 1 0 010 1.414l-.707.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm5.414 5.414a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707zM5 8a1 1 0 100-2H4a1 1 0 100 2h1z" clip-rule="evenodd"></path>
          </svg>
          <svg *ngIf="!themeService.isDarkMode()" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
          </svg>
        </button>

        <!-- Language Toggle -->
        <button
          (click)="toggleLanguage()"
          class="px-3 py-2 rounded-lg hover:bg-white/10 text-white/60 hover:text-white font-semibold text-sm transition-all"
          title="Toggle language"
        >
          {{ i18nService.isArabic() ? 'EN' : 'AR' }}
        </button>
      </div>

      <p class="text-white/40 text-xs">
        &copy; 2026 HR Analytics Platform. All rights reserved.
      </p>
    </div>
  </div>
</div>
