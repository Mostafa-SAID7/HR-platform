<!-- Main Container -->
<div 
  class="flex h-screen bg-slate-50 dark:bg-slate-900 overflow-hidden relative" 
  [dir]="i18nService.isArabic() ? 'rtl' : 'ltr'"
>
  
  <!-- Sidebar Mobile Overlay -->
  <div 
    *ngIf="isSidebarOpen()"
    [@fadeIn]
    class="fixed inset-0 z-20 bg-slate-900/60 backdrop-blur-sm md:hidden transition-opacity"
    (click)="isSidebarOpen.set(false)"
  ></div>

  <!-- SIDEBAR -->
  <aside
    class="fixed md:static inset-y-0 z-30 w-72 bg-gradient-to-b from-slate-900 to-slate-950 border-e border-slate-800 shadow-2xl md:shadow-none overflow-y-auto transform transition-transform duration-300 ease-in-out flex flex-col"
    [ngClass]="{
      'translate-x-0': isSidebarOpen(), 
      '-translate-x-full': !isSidebarOpen() && !i18nService.isArabic(),
      'translate-x-full': !isSidebarOpen() && i18nService.isArabic()
    }"
  >
    <!-- Brand Logo Section -->
    <div class="p-6 flex items-center gap-3 border-b border-slate-800/50 flex-shrink-0 bg-gradient-to-b from-slate-800/20 to-transparent">
      <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-indigo-700 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-600/30">
        HR
      </div>
      <div class="flex flex-col flex-1">
        <h1 class="text-sm font-black text-white uppercase tracking-tighter">HR Analytics</h1>
        <p class="text-[10px] text-indigo-400/70 font-bold uppercase tracking-wider">Platform</p>
      </div>
      <button
        (click)="isSidebarOpen.set(false)"
        class="md:hidden p-1 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-white transition-all"
        aria-label="Close sidebar"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">
      <a 
        *ngFor="let link of navLinks"
        [routerLink]="link.path"
        routerLinkActive="bg-indigo-600/20 text-indigo-400 border-l-2 border-indigo-500"
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800/50 hover:text-white transition-all border-l-2 border-transparent"
      >
        <span class="font-medium text-sm">{{ i18nService.translate(link.labelKey) || link.label }}</span>
      </a>
    </nav>

    <!-- Settings & Logout -->
    <div class="border-t border-slate-800/50 p-4 space-y-2 flex-shrink-0">
      <a 
        routerLink="/settings"
        routerLinkActive="bg-indigo-600/20 text-indigo-400 border-l-2 border-indigo-500"
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800/50 hover:text-white transition-all border-l-2 border-transparent"
      >
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.107.886-.54 2.042-.061 2.287.947.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287.948c1.372.836 2.942-.734 2.106-2.106-.54-.886-.061-2.042.947-2.287 1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.107-.886.54-2.042.061-2.287-.947zm-6.925 4.11c.612-.468 1.456-.468 2.068 0l.858.858a.5.5 0 11-.707.707l-.858-.859a.5.5 0 00-.707 0l-.858.858a.5.5 0 10-.707-.707l.858-.858z" clip-rule="evenodd"></path>
        </svg>
        <span class="font-medium text-sm">Settings</span>
      </a>

      <button 
        (click)="logout()"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-red-600/20 hover:text-red-400 transition-all text-left"
      >
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"></path>
        </svg>
        <span class="font-medium text-sm">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- HEADER/NAVBAR -->
    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-sm h-16 flex-shrink-0">
      <div class="h-full px-4 md:px-6 flex items-center justify-between gap-4">
        
        <!-- Left Section: Menu Toggle & Page Title -->
        <div class="flex items-center gap-4 flex-1 min-w-0">
          <button 
            (click)="toggleSidebar()"
            class="md:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-all"
            aria-label="Toggle sidebar"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>

          <div class="flex-1 min-w-0">
            <h2 class="text-lg font-bold text-slate-900 dark:text-white truncate">{{ pageTitle() }}</h2>
          </div>
        </div>

        <!-- Right Section: Theme, Language, Connection Status, User Menu -->
        <div class="flex items-center gap-2 flex-shrink-0">
          <!-- Connection Status -->
          <app-connection-status></app-connection-status>

          <!-- Theme Toggle -->
          <button
            (click)="toggleTheme()"
            class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-all"
            title="Toggle theme"
          >
            <svg *ngIf="themeService.isDarkMode()" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.536l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.121-10.607a1 1 0 010 1.414l-.707.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm5.414 5.414a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707zM5 8a1 1 0 100-2H4a1 1 0 100 2h1z" clip-rule="evenodd"></path>
            </svg>
            <svg *ngIf="!themeService.isDarkMode()" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
          </button>

          <!-- Language Toggle -->
          <button
            (click)="toggleLanguage()"
            class="px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold text-sm transition-all"
            title="Toggle language"
          >
            {{ i18nService.isArabic() ? 'EN' : 'AR' }}
          </button>

          <!-- User Menu Dropdown -->
          <div class="relative">
            <button
              (click)="isUserMenuOpen.set(!isUserMenuOpen())"
              class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-all"
              aria-haspopup="true"
              [attr.aria-expanded]="isUserMenuOpen()"
            >
              <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold">
                {{ (currentUser()?.name || 'U')[0] }}
              </div>
              <svg 
                class="w-4 h-4 transition-transform"
                [class.rotate-180]="isUserMenuOpen()"
                fill="none" 
                stroke="currentColor" 
                viewBox="0 0 24 24"
              >
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
              </svg>
            </button>

            <!-- Dropdown Menu -->
            <div 
              *ngIf="isUserMenuOpen()"
              [@fadeIn]
              class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg z-50"
            >
              <div class="px-4 py-3 border-b border-slate-200 dark:border-slate-700">
                <p class="text-sm font-semibold text-slate-900 dark:text-white">{{ currentUser()?.name }}</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">{{ currentUser()?.email }}</p>
              </div>
              <a 
                routerLink="/profile"
                class="block px-4 py-2 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all"
              >
                Profile
              </a>
              <button 
                (click)="logout()"
                class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all"
              >
                Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main 
      class="flex-1 overflow-y-auto"
      [@routeAnimation]
    >
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
