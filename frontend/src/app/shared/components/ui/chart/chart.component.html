<div class="w-full" [style.height]="config().height || '400px'">
  <div
    #chartContainer
    class="w-full h-full rounded-lg bg-white dark:bg-gray-800 shadow-md dark:shadow-lg"
    [attr.aria-label]="config().title || 'Chart'"
    role="img"
  ></div>
  <div
    *ngIf="config().loading"
    class="absolute inset-0 flex items-center justify-center bg-white/50 dark:bg-gray-800/50 rounded-lg"
  >
    <div class="text-gray-600 dark:text-gray-400">Loading chart...</div>
  </div>
</div>
