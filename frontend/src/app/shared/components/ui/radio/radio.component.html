<fieldset class="space-y-3">
  <legend *ngIf="label" class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
    {{ label }}
  </legend>

  <div role="radiogroup" [attr.aria-label]="ariaLabel || label" [attr.aria-disabled]="disabled">
    <div *ngFor="let option of options; let idx = index" class="flex items-center">
      <input
        type="radio"
        [id]="id + '-' + idx"
        [name]="id"
        [value]="option.value"
        [(ngModel)]="selectedValue"
        (change)="onSelectionChange(option.value)"
        (keydown)="onKeydown($event, idx)"
        [disabled]="disabled || (option.disabled ?? false)"
        [attr.aria-label]="option.label"
        [attr.aria-disabled]="disabled || (option.disabled ?? false)"
        class="w-4 h-4 border-gray-300 dark:border-gray-600 text-primary-hover dark:text-primary focus:ring-primary dark:focus:ring-primary-light cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      />
      <label
        [for]="id + '-' + idx"
        class="ml-2 text-sm font-medium text-gray-700 dark:text-gray-300 cursor-pointer select-none"
        [class.opacity-50]="disabled || option.disabled"
        [class.cursor-not-allowed]="disabled || option.disabled"
      >
        {{ option.label }}
      </label>
    </div>
  </div>
</fieldset>
