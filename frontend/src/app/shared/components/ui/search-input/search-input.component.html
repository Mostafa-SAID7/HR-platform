<div class="relative">
  <div
    class="flex items-center gap-2 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus-within:ring-2 focus-within:ring-primary focus-within:border-primary"
  >
    <svg
      class="w-5 h-5 text-gray-400 dark:text-gray-500"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
      ></path>
    </svg>
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (ngModelChange)="onSearchChange($event)"
      [placeholder]="placeholder"
      class="flex-1 bg-transparent text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 outline-none text-sm"
      [attr.aria-label]="'Search ' + placeholder"
      autocomplete="off"
    />
    <button
      *ngIf="searchQuery"
      (click)="clearSearch()"
      class="text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors"
      aria-label="Clear search"
    >
      ×
    </button>
  </div>

  <!-- Search Suggestions -->
  <div
    *ngIf="showSuggestions() && suggestions().length > 0"
    class="absolute top-full left-0 right-0 mt-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg shadow-lg z-10 max-h-64 overflow-y-auto"
  >
    <div
      *ngFor="let suggestion of suggestions()"
      class="px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer transition-colors"
    >
      <button
        (click)="selectSuggestion(suggestion)"
        class="w-full text-left text-sm text-gray-900 dark:text-white"
        [attr.aria-label]="'Select ' + suggestion"
      >
        {{ suggestion }}
      </button>
    </div>
  </div>

  <!-- Search Help -->
  <div
    *ngIf="showHelp()"
    class="absolute top-full left-0 right-0 mt-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg shadow-lg z-10 p-3"
  >
    <p class="text-xs font-semibold text-gray-700 dark:text-gray-300 mb-2">Search Tips:</p>
    <ul class="text-xs text-gray-600 dark:text-gray-400 space-y-1">
      <li>• Type to search across all fields</li>
      <li>
        • Use <code class="bg-gray-100 dark:bg-gray-800 px-1 rounded">field:value</code> for
        specific fields
      </li>
      <li>
        • Example:
        <code class="bg-gray-100 dark:bg-gray-800 px-1 rounded">department:Engineering</code>
      </li>
    </ul>
  </div>
</div>
