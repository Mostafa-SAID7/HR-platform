<nav class="flex items-center gap-2 text-sm" aria-label="Breadcrumb">
  <ol class="flex items-center gap-2">
    <li *ngFor="let item of items; let last = last">
      <a
        *ngIf="!last && item.route"
        [routerLink]="item.route"
        class="text-primary-hover dark:text-primary-light hover:text-primary-dark dark:hover:text-primary-light transition-colors"
      >
        {{ item.label }}
      </a>
      <span *ngIf="last" class="text-gray-900 dark:text-white font-medium">
        {{ item.label }}
      </span>
      <span *ngIf="!last" class="text-gray-400 dark:text-gray-600 mx-1">/</span>
    </li>
  </ol>
</nav>
