<div class="space-y-2">
  <div
    *ngFor="let item of items; let i = index"
    class="border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden"
  >
    <!-- Accordion Header -->
    <button
      (click)="toggleItem(i)"
      [attr.aria-expanded]="isItemOpen(i)"
      [attr.aria-controls]="'accordion-panel-' + i"
      [disabled]="item.disabled"
      class="w-full px-4 py-3 flex items-center justify-between bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset dark:focus:ring-primary-light disabled:opacity-50 disabled:cursor-not-allowed"
      role="button"
      type="button"
      (keydown)="onHeaderKeyDown($event, i)"
    >
      <span class="flex items-center gap-3 text-left">
        <svg
          class="w-5 h-5 text-gray-600 dark:text-gray-400 transition-transform duration-300"
          [class.rotate-180]="isItemOpen(i)"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 14l-7 7m0 0l-7-7m7 7V3"
          ></path>
        </svg>
        <span class="font-medium text-gray-900 dark:text-white">
          {{ item.title }}
        </span>
      </span>
      <span *ngIf="item.badge" class="text-xs bg-primary-hover text-white px-2 py-1 rounded">
        {{ item.badge }}
      </span>
    </button>

    <!-- Accordion Panel -->
    <div
      *ngIf="isItemOpen(i)"
      [id]="'accordion-panel-' + i"
      role="region"
      [attr.aria-labelledby]="'accordion-header-' + i"
      class="border-t border-gray-200 dark:border-gray-700 px-4 py-3 bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 animate-in fade-in slide-in-from-top-2 duration-300"
    >
      <ng-container *ngIf="item.content">
        {{ item.content }}
      </ng-container>
      <ng-content></ng-content>
    </div>
  </div>
</div>
